<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #111827, #1f2937);
        color: #f8fafc;
      }

      .page {
        max-width: 720px;
        width: 100%;
        padding: 2rem;
        text-align: center;
      }

      .card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 3rem 2rem;
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(3rem, 5vw, 5rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 1.5rem;
        line-height: 1.8;
        color: #d1d5db;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.8rem;
        background: #2563eb;
        color: #ffffff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 600;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .home-link:hover {
        transform: translateY(-2px);
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>404</h1>
        <p>
          Sorry, we couldn't find the page you were looking for. Please check the link or return to the homepage to continue browsing game guides.
        </p>
        <a class="home-link" href="index.html">Back to Homepage</a>
      </section>
    </main>
  </body>
</html>
