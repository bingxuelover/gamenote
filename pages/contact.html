<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Game Guide Collection</title>
    <style>
      :root {
        --bg: #f4f4f8;
        --surface: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --border: #d1d5db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: var(--primary);
        text-decoration: none;
      }

      a:hover {
        color: var(--primary-dark);
      }

      header {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 2rem 1rem;
      }

      header h1 {
        margin: 0;
        font-size: clamp(2.2rem, 4vw, 3.6rem);
      }

      header p {
        margin: 1rem auto 0;
        max-width: 720px;
        font-size: 1rem;
        line-height: 1.7;
        opacity: 0.95;
      }

      .page {
        max-width: 1160px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
      }

      .card h2,
      .card h3 {
        color: var(--text);
      }

      .card h2 {
        margin-top: 0;
      }

      .card p,
      .card li {
        line-height: 1.75;
      }

      .card ul {
        padding-left: 1.4rem;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
        font-weight: 600;
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Contact Us</h1>
      <p>Get in touch with us.</p>
    </header>

    <main class="page">
      <article class="card">
        <h2>How to Reach Us</h2>
        <p>Email: <a href="mailto:contact@gamefun.cc">contact@gamefun.cc</a></p>
        <p>
          We appreciate your feedback and suggestions for improving our guides.
        </p>
      </article>

      <a class="back-link" href="../index.html">← Back to Home</a>
    </main>
  </body>
</html>
